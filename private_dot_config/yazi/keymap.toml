# For the most part I want to stick to the defaults so I will use configuration mixing.

[mgr]
# Binds that match first take precendence, so prepnd to override defaults.
prepend_keymap = [

    # Invert default "o" behavior.  "<Enter>" still uses old behavior.
	{ on = "O",         run = "open",                        desc = "Open selected files" },
	{ on = "o",         run = "open --interactive",          desc = "Open selected files interactively" },

	# Make Shift+PageUp/PageDown match intuition by scrolling the preview window.
	{ on = "<S-PageUp>",     run = "seek -5", desc = "Seek up 5 units in the preview" },
	{ on = "<S-PageDown>",   run = "seek 5",  desc = "Seek down 5 units in the preview" },

	# Also Shift+Up/Down
	{ on = "<S-Up>",     run = "seek -1", desc = "Seek up 1 units in the preview" },
	{ on = "<S-Down>",   run = "seek 1",  desc = "Seek down 1 units in the preview" },

	]

# Not entirely sure what the use case for this section would be.
append_keymap = [

]
